#!/usr/sbin/nft -f
#
# NETRA — host nftables ruleset: DEFAULT-DROP egress (air-gap layer 2).
# =====================================================================
# Part of the defense-in-depth egress model (ARCHITECTURE.md §8, research
# 07-noc-workflow-security.md §B6.2). Any single layer blocks egress; this is
# the host-firewall layer. Apply with:  sudo nft -f security/nftables.conf
# Inspect counters with:                sudo nft list table inet netra_airgap
#
# ---------------------------------------------------------------------------
# CRITICAL CORRECTION (PR review, P1): container egress traverses FORWARD,
# NOT host OUTPUT.
# ---------------------------------------------------------------------------
# A host `output` hook only governs traffic that *originates on the host
# itself*. Container traffic is routed/NATed through the Docker bridge and
# therefore traverses the `forward` path on its way out — it never hits the
# host `output` hook. An output-only rule will NOT block a container reaching
# the internet. The chain that actually governs container egress is a
# `forward` hook (priority 0), evaluated for forwarded packets. We put the
# default-deny + log there, and ALSO keep an `output` chain as defense-in-depth
# for host-originated traffic.
#
# Note on ordering vs Docker: Docker installs its own iptables/nft rules
# (DOCKER, DOCKER-USER, etc.). For the iptables data path, the companion
# script `docker-user.sh` inserts the authoritative allow/log/drop into the
# DOCKER-USER chain (consulted BEFORE Docker's own forward/NAT rules). THIS
# file is the native-nftables host firewall; on a host using the nftables
# backend it provides an independent forward-path backstop. Run BOTH layers.
#
# Allowed destinations (edit INTRA_LAB_* below to match your deployment):
#   - loopback (lo)
#   - the Docker bridge subnet(s) used by the airgap compose network
#   - (optional) on-prem LAN telemetry sources (SNMP/syslog/NetFlow exporters)
# Everything else is logged (prefix "EGRESS-DROP ") + counted + dropped.
#
# Standards: NIST SP 800-53 SC-7 (boundary protection) / SC-7(21) (component
# isolation).

# Make this script idempotent: `add` creates the table if absent (no-op if it
# already exists), then `delete` removes it so the definition below starts
# clean. This idiom is safe on a FRESH system (a bare `delete` of an absent
# table would error).
add table inet netra_airgap
delete table inet netra_airgap

table inet netra_airgap {

	# ---------------------------------------------------------------------
	# Tunable address sets. Adjust to your environment.
	#   - 172.16.0.0/12 covers the default Docker bridge pools (incl.
	#     172.17.0.0/16 and the 172.18+/16 user-defined-bridge pools).
	#   - 10.0.0.0/8 / 192.168.0.0/16 are OPTIONAL on-prem LAN telemetry
	#     source ranges — keep them only if NETRA must scrape real devices;
	#     for a fully self-contained synthetic demo you may delete them.
	# ---------------------------------------------------------------------
	set intra_lab_v4 {
		type ipv4_addr
		flags interval
		elements = {
			172.16.0.0/12,   # Docker bridge networks (incl. airgap_net)
			10.0.0.0/8,      # (optional) LAN telemetry sources
			192.168.0.0/16   # (optional) LAN telemetry sources
		}
	}

	# ============================ FORWARD ================================
	# THE governing chain for CONTAINER egress (routed/NATed traffic).
	chain forward {
		type filter hook forward priority 0; policy drop;

		# Replies to already-allowed conversations.
		ct state established,related accept

		# Allow intra-lab forwarding (container<->container, container<->LAN
		# telemetry). Anything destined OUTSIDE these ranges is NOT accepted
		# here and falls through to the log+drop below.
		ip daddr @intra_lab_v4 accept

		# Allow intra-host IPv6 link-local / ULA only; global v6 is dropped.
		ip6 daddr fe80::/10 accept
		ip6 daddr fc00::/7 accept

		# Everything else = blocked container egress. Log (rate-limited so a
		# flood can't fill the journal) + count + drop. The counter is the
		# live "N blocked egress attempts" evidence surfaced in Grafana.
		counter log prefix "EGRESS-DROP " level warn flags all \
			limit rate 10/second burst 20 packets
		counter drop
	}

	# ============================ OUTPUT =================================
	# DEFENSE-IN-DEPTH: host-ORIGINATED traffic only (does NOT see container
	# egress — that is handled in `forward` above). Keeps the host appliance
	# itself from phoning home.
	chain output {
		type filter hook output priority 0; policy drop;

		oif "lo" accept
		ct state established,related accept
		ip daddr @intra_lab_v4 accept
		ip6 daddr fe80::/10 accept
		ip6 daddr fc00::/7 accept

		counter log prefix "AIRGAP-EGRESS-DROP " level warn flags all \
			limit rate 10/second burst 20 packets
		counter drop
	}

	# ============================ INPUT =================================
	# Accept loopback + intra-lab + replies; drop unsolicited inbound from
	# outside the lab. (Published UI/API/Grafana ports should be bound to
	# 127.0.0.1 in compose, so they arrive via lo and are accepted here.)
	chain input {
		type filter hook input priority 0; policy drop;

		iif "lo" accept
		ct state established,related accept
		ct state invalid drop
		ip saddr @intra_lab_v4 accept
		ip6 saddr fe80::/10 accept
		ip6 saddr fc00::/7 accept

		# ICMP/ICMPv6 for path MTU + diagnostics inside the lab only.
		ip protocol icmp icmp type { echo-request, echo-reply, destination-unreachable, time-exceeded } accept
		ip6 nexthdr icmpv6 icmpv6 type { echo-request, echo-reply, nd-neighbor-solicit, nd-neighbor-advert, nd-router-advert } accept

		counter log prefix "AIRGAP-INPUT-DROP " level warn flags all \
			limit rate 5/second burst 10 packets
		counter drop
	}
}
