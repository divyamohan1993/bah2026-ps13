# telegraf.conf — multi-signal telemetry collector (NETRA Phase 2, Workstream 2)
# ============================================================================
# One static Go binary covering the PS-13 signal classes that the FRR / classic
# nodes expose only via SNMP / syslog / NetFlow (the SR Linux nodes stream gNMI
# via gnmic.yaml instead). Telegraf writes to BOTH sinks:
#   * VictoriaMetrics   — history, via Prometheus remote_write (numeric metrics).
#   * NATS JetStream     — the live bus the O(1) feature engine consumes.
#
# Run (offline, inside the air-gap):
#   telegraf --config telemetry/telegraf.conf
#
# Air-gap: every agent/endpoint below is an RFC1918 lab address or localhost; no
# cloud endpoint appears. Telegraf phones home only if `outputs.health`/usage
# reporting is enabled — it is NOT enabled here.
# ============================================================================

[global_tags]
  pipeline = "telegraf"
  source = "sim"            # consumers set TelemetrySourceKind.SIM from this tag

[agent]
  interval = "10s"          # SNMP poll cadence (gNMI on-change covers sub-second)
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 100000   # on-host buffering absorbs bus/TSDB hiccups
  collection_jitter = "1s"
  flush_interval = "10s"
  flush_jitter = "2s"
  precision = "1s"
  omit_hostname = false

# ============================================================================
# INPUTS — the five PS-13 signal classes
# ============================================================================

# --- Interface counters (utilisation / errors / discards) via SNMP ----------
# Maps to TelemetryRecord(metric_name=if_*..., kind=snmp). HC (64-bit) octet
# counters avoid 32-bit wrap on fast links.
[[inputs.snmp]]
  agents = [
    "udp://ce-br1.lab:161", "udp://ce-br2.lab:161", "udp://ce-br3.lab:161",
    "udp://pe-hub1.lab:161", "udp://pe-dc1.lab:161", "udp://pe-dc2.lab:161",
  ]
  version = 2
  community = "${SNMP_COMMUNITY:=public}"
  timeout = "5s"
  retries = 1
  name = "interface"

  [[inputs.snmp.field]]
    oid = "RFC1213-MIB::sysUpTime.0"
    name = "uptime"

  [[inputs.snmp.table]]
    oid = "IF-MIB::ifXTable"
    name = "interface"
    inherit_tags = ["source"]
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifName"
      name = "interface"
      is_tag = true
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCInOctets"        # -> if_in_octets
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCOutOctets"       # -> if_out_octets
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCInUcastPkts"
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHCOutUcastPkts"

  [[inputs.snmp.table]]
    oid = "IF-MIB::ifTable"
    name = "interface_errors"
    inherit_tags = ["source"]
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifName"
      name = "interface"
      is_tag = true
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifInErrors"          # -> if_in_errors (error-rate accel)
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOutDiscards"       # -> if_out_discards (queue drops)
    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOperStatus"

# --- Syslog (link up/down, BGP/OSPF flaps, IPSec rekey, config-change) -------
# Maps to SyslogEvent. mnemonic (e.g. %BGP-5-ADJCHANGE) is preserved verbatim
# for routing detectors + RAG keyword retrieval.
[[inputs.syslog]]
  server = "udp://:5514"               # RFC5424/3164 over UDP
  syslog_standard = "RFC5424"
  best_effort = true                   # tolerate the BSD/3164 nodes too
  [inputs.syslog.tags]
    signal = "syslog"

# --- NetFlow / IPFIX / sFlow flow records ------------------------------------
# Maps to FlowRecord (traffic matrix + blast-radius input). For heavy flow
# volume, prefer pmacct/nfacctd (see pmacct/) which aggregates in-collector.
[[inputs.netflow]]
  service_address = "udp://:2055"      # NetFlow v5/v9 + IPFIX
  [inputs.netflow.tags]
    signal = "netflow"

[[inputs.sflow]]
  service_address = "udp://:6343"      # sFlow (sub-second sampled)
  [inputs.sflow.tags]
    signal = "sflow"

# --- SD-WAN overlay tunnel + QoS class counters via SNMP ---------------------
# Maps to TunnelStat (loss/jitter/rekey) + per-class QoS drops. CE endpoints.
[[inputs.snmp]]
  agents = ["udp://ce-br1.lab:161", "udp://ce-br2.lab:161", "udp://ce-br3.lab:161"]
  version = 2
  community = "${SNMP_COMMUNITY:=public}"
  name = "tunnel"
  [[inputs.snmp.table]]
    oid = "IPSEC-FLOW-MONITOR-MIB::ipsecTunnelTable"
    name = "tunnel"
    inherit_tags = ["source"]
    [[inputs.snmp.table.field]]
      oid = "IPSEC-FLOW-MONITOR-MIB::ipsecTunIndex"
      name = "tunnel_id"
      is_tag = true

# ============================================================================
# PROCESSORS — light normalisation toward the contract types
# ============================================================================
# Derive interface utilisation % from the HC octet counters (rate over interval
# / ifSpeed) so the engine receives if_util_pct directly. `non_negative`
# protects against counter resets (reboots) producing spurious negative rates.
[[processors.rate]]
  namepass = ["interface"]
  [processors.rate.tags]
    derived = "rate"

# ============================================================================
# OUTPUTS — VictoriaMetrics (history) + NATS JetStream (live bus)
# ============================================================================

# --- VictoriaMetrics via Prometheus remote_write (numeric history) ----------
[[outputs.http]]
  url = "http://127.0.0.1:8428/api/v1/write"
  data_format = "prometheusremotewrite"
  [outputs.http.headers]
    Content-Type = "application/x-protobuf"
    Content-Encoding = "snappy"

# --- NATS JetStream (the live telemetry bus the feature engine consumes) -----
# Subjects are routed under telemetry.> so the JetStream TELEMETRY stream
# (nats-streams.sh) captures them. JSON so the Python consumer deserialises
# straight into TelemetryRecord / SyslogEvent / FlowRecord.
[[outputs.nats]]
  servers = ["nats://127.0.0.1:4222"]
  subject = "telemetry.telegraf"
  data_format = "json"
  json_timestamp_units = "1s"
  # Jetstream block makes Telegraf publish into the JetStream-managed stream.
  [outputs.nats.jetstream]
    name = "TELEMETRY"
