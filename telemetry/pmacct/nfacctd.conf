! nfacctd.conf — high-volume NetFlow/IPFIX accounting (NETRA Phase 2, WS2, OPTIONAL)
! ===========================================================================
! pmacct's nfacctd is a tiny C collector purpose-built for high-volume flow
! accounting with IN-COLLECTOR aggregation/sampling — the cheapest way to cut
! flow-record volume BEFORE it hits the bus (research 02 §1.2). Add this lane
! only when the Telegraf `netflow` input cannot keep up with flow volume;
! otherwise Telegraf alone covers FlowRecord.
!
! Run (offline): nfacctd -f telemetry/pmacct/nfacctd.conf
! Air-gap: all plugins write to localhost (NATS/file); no external endpoint.
! ===========================================================================

! --- ingest: NetFlow v9 / IPFIX on :2056 (Telegraf uses :2055; keep distinct) -
nfacctd_port: 2056
nfacctd_time_new: true

! --- aggregation: the key that defines a "flow" for the traffic matrix --------
! src/dst host+port+proto+iface+VRF -> maps to FlowRecord fields. Coarser keys
! (drop ports) cut cardinality further if volume is extreme.
aggregate: src_host, dst_host, src_port, dst_port, proto, in_iface, out_iface, vrf, tos

! --- in-collector sampling/renormalisation (volume reduction) -----------------
! Honour the exporter's sampling rate and renormalise byte/packet counts so the
! downstream traffic matrix is accurate despite sampling.
nfacctd_renormalize: true

! --- BGP/BMP correlation (optional): attach src/dst AS + next-hop to flows -----
! Lets blast-radius intersect flows with routing state. Peer with the RR/PEs.
bgp_daemon: true
bgp_daemon_ip: 127.0.0.1
bgp_daemon_port: 1790
bgp_agent_map: /etc/pmacct/peering_agent.map

! --- output plugins -----------------------------------------------------------
! Primary: publish aggregated flows to NATS (bus consumer maps to FlowRecord).
! Fallback: also write rolling JSON files for offline batch analysis.
plugins: nats[flows], print[file]

! NATS plugin -> telemetry.flows (JetStream TELEMETRY stream)
nats_host: 127.0.0.1:4222
nats_topic[flows]: telemetry.flows
nats_output[flows]: json
nats_refresh_time[flows]: 10        ! flush aggregated flows every 10s

! file plugin -> rolling JSONL (offline analysis / replay)
print_output[file]: json
print_output_file[file]: /var/lib/pmacct/flows-%Y%m%d-%H%M.jsonl
print_refresh_time[file]: 60
print_history[file]: 1m
print_history_roundoff[file]: m
