# strongSwan IPSec config — branch ce-br1 (route-based / GRE-over-IPSec to hub)
# ============================================================================
# Route-based VPN: strongSwan negotiates the IKEv2 SA between the branch and the
# hub head-end, and a GRE interface (gre1) rides over the IPSec transport so FRR
# can run OSPF across it (research/01 §2.3). The short, deliberately-tunable
# rekey/lifetime is what makes scenario C's "IPSec rekey-interval anomaly"
# precursor observable: under underlay stress the SA rebuilds early and the
# observed rekey interval deviates from this baseline.
#
# This is the classic GRE-over-IPSec pattern: type=transport, protecting the GRE
# (proto 47) between the two tunnel endpoints' underlay loopbacks/addresses.

config setup
    charondebug="ike 1, knl 1, cfg 0"
    uniqueids=yes

conn %default
    keyexchange=ikev2
    dpdaction=restart
    dpddelay=10s
    dpdtimeout=30s
    # Baseline rekey/lifetimes — scenario C perturbs the EFFECTIVE rekey interval.
    ikelifetime=3600s
    lifetime=3600s
    margintime=180s
    rekeyfuzz=5%
    keyingtries=%forever
    ike=aes256-sha256-modp2048!
    esp=aes256-sha256!

# GRE-over-IPSec to the hub head-end (ce-hub). transport mode protects proto 47.
conn to-hub
    left=10.2.11.2                 # branch underlay address (PE-CE side)
    leftid=@ce-br1
    leftprotoport=gre
    right=10.2.1.2                 # hub head-end underlay address
    rightid=@ce-hub
    rightprotoport=gre
    type=transport
    auto=start
