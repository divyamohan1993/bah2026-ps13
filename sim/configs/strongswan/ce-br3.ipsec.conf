# strongSwan IPSec config — branch ce-br3 (GRE-over-IPSec to hub)
# ===============================================================
# Route-based VPN to the hub head-end; mirrors ce-br1 with branch-3 endpoints.
# (ce-br3's PE-CE link is in the OT VRF; the overlay to the hub serves CORP.)
config setup
    charondebug="ike 1, knl 1, cfg 0"
    uniqueids=yes

conn %default
    keyexchange=ikev2
    dpdaction=restart
    dpddelay=10s
    dpdtimeout=30s
    ikelifetime=3600s
    lifetime=3600s
    margintime=180s
    rekeyfuzz=5%
    keyingtries=%forever
    ike=aes256-sha256-modp2048!
    esp=aes256-sha256!

conn to-hub
    left=10.2.31.2
    leftid=@ce-br3
    leftprotoport=gre
    right=10.2.1.2
    rightid=@ce-hub
    rightprotoport=gre
    type=transport
    auto=start
