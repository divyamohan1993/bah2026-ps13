# strongSwan IPSec config — hub head-end ce-hub (GRE-over-IPSec aggregation)
# ==========================================================================
# The hub-spoke aggregation point: ce-hub terminates a GRE-over-IPSec tunnel from
# each branch (br1/br2/br3) plus a tunnel to the DC, and runs OSPF across them
# (configs/frr/ce-hub/frr.conf). This is the strongSwan side of the SD-WAN
# overlay; the rekey/lifetime baseline here mirrors the branches so scenario C's
# rekey-anomaly precursor is measured consistently at both ends.

config setup
    charondebug="ike 1, knl 1, cfg 0"
    uniqueids=yes

conn %default
    keyexchange=ikev2
    dpdaction=clear
    dpddelay=10s
    dpdtimeout=30s
    ikelifetime=3600s
    lifetime=3600s
    margintime=180s
    rekeyfuzz=5%
    keyingtries=%forever
    ike=aes256-sha256-modp2048!
    esp=aes256-sha256!
    type=transport
    leftprotoport=gre
    rightprotoport=gre
    left=10.2.1.2                  # hub head-end underlay address
    leftid=@ce-hub

conn from-br1
    right=10.2.11.2
    rightid=@ce-br1
    auto=add
conn from-br2
    right=10.2.21.2
    rightid=@ce-br2
    auto=add
conn from-br3
    right=10.2.31.2
    rightid=@ce-br3
    auto=add
