! FRRouting config — P core router p3 (IS-IS + SR-MPLS transport)
! ===============================================================
! Core label-switching router. Sits between p2, p4, p1 (diagonal) and the hub PE.
! The p2<->p3 / p1<->p3 core links are scenario-C injection points (intermittent
! underlay failure -> overlay tunnel degradation). SRGB base 16000; node SID 3.
frr version 10.3
frr defaults traditional
hostname p3
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.3/32
 ip router isis CORE
 isis passive
exit
interface eth1
 description core-to-p2
 ip address 10.1.23.2/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
interface eth2
 description core-to-p4
 ip address 10.1.34.1/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
interface eth3
 description core-to-p1-diagonal
 ip address 10.1.13.2/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
interface eth4
 description core-to-pe-hub
 ip address 10.1.103.1/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
!
router isis CORE
 is-type level-2-only
 net 49.0001.0000.0000.0003.00
 metric-style wide
 segment-routing on
 segment-routing global-block 16000 23999
 segment-routing prefix 10.0.0.3/32 index 3
exit
!
bfd
 peer 10.1.23.1
 peer 10.1.13.1
exit
