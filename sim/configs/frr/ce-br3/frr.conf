! FRRouting config — Customer Edge ce-br3 (branch spoke; CORP + OT VRFs)
! ======================================================================
! Branch spoke that carries BOTH customer VRFs: its PE-CE link to pe-dc2 is in
! the OT VRF (10.2.30.0/30) while the overlay to the hub serves CORP. ce-br3 is
! therefore the site where scenario D's wrong-RT-import leak (CORP<->OT) becomes
! observable as cross-VRF reachability it should never have.
frr version 10.3
frr defaults traditional
hostname ce-br3
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.23/32
exit
! PE-CE access into the OT VRF (on pe-dc2).
interface eth1
 description to-pe-dc2-OT
 ip address 10.2.30.2/30
exit
interface eth2
 description branch3-LAN
 ip address 192.168.31.1/24
exit
! Overlay to the hub (CORP) — OSPF inside the tunnel.
interface gre1
 description overlay-to-hub
 ip address 172.16.31.2/30
 ip ospf cost 100
 ip ospf network point-to-point
 ip ospf dead-interval 12
 ip ospf hello-interval 3
exit
!
! eBGP to pe-dc2 for the OT VRF LAN; OSPF for the CORP overlay.
router bgp 65023
 bgp router-id 10.0.0.23
 neighbor 10.2.30.1 remote-as 65000
 address-family ipv4 unicast
  network 192.168.31.0/24
  neighbor 10.2.30.1 activate
 exit-address-family
exit
router ospf
 ospf router-id 10.0.0.23
 network 172.16.31.0/30 area 0
 bfd
exit
