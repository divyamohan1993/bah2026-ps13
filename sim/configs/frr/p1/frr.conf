! FRRouting config — P core router p1 (IS-IS + SR-MPLS transport)
! ===============================================================
! A provider-core label-switching router: no VRFs, no customer routes — it only
! carries the SR-MPLS underlay (IS-IS L2 with a node SID, MPLS enabled on every
! core-facing interface). Scenario C (intermittent MPLS underlay failure) is
! injected on the p1<->p3 / p2<->p3 core links.
!
! SRGB base 16000 (FRR default); p1 node SID index = 1 -> label 16001.
frr version 10.3
frr defaults traditional
hostname p1
log syslog informational
service integrated-vtysh-config
!
! Enable MPLS forwarding on the loopback + each core interface (the dataplane
! also needs the host kernel modules + per-iface sysctl; see topology.clab.yml).
interface lo
 ip address 10.0.0.1/32
 ip router isis CORE
 isis passive
exit
!
interface eth1
 description core-to-p2
 ip address 10.1.12.1/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
interface eth2
 description core-to-p4
 ip address 10.1.41.2/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
interface eth3
 description core-to-p3-diagonal
 ip address 10.1.13.1/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
interface eth4
 description core-to-pe-dc1
 ip address 10.1.101.1/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
!
! IS-IS level-2 underlay with Segment Routing (no LDP needed).
router isis CORE
 is-type level-2-only
 net 49.0001.0000.0000.0001.00
 metric-style wide
 segment-routing on
 segment-routing global-block 16000 23999
 segment-routing node-msd 10
 segment-routing prefix 10.0.0.1/32 index 1
exit
!
! BFD for sub-second link-failure detection (feeds scenario-C precursors).
bfd
 peer 10.1.12.2
 peer 10.1.13.2
exit
