! FRRouting config — Provider Edge pe-dc2 (L3VPN: VRF + MP-BGP VPNv4)
! ===================================================================
! A PE router: IS-IS/SR-MPLS into the core (transport) + per-customer VRFs with
! MP-BGP VPNv4 to the route reflector. ce-br3 attaches here in the OT VRF, so
! this PE participates in scenario D (a wrong RT import here leaks CORP<->OT).
!
! CRITICAL: `send-community both` (or `extended`) on the VPNv4 session is
! MANDATORY — without it the route-target extended communities that drive VRF
! import/export are stripped and L3VPN silently fails (research/01 §2.2).
frr version 10.3
frr defaults traditional
hostname pe-dc2
log syslog informational
service integrated-vtysh-config
!
! VRF definitions — CORP (100:1) and OT (100:2). Keep RTs distinct so the two
! customers are isolated unless a (mis)config leaks them.
vrf CORP
 vni 0
exit-vrf
vrf OT
 vni 0
exit-vrf
!
interface lo
 ip address 10.0.0.6/32
 ip router isis CORE
 isis passive
exit
!
interface eth1
 description uplink-to-p2-core
 ip address 10.1.102.1/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
!
! PE-CE access link for ce-br3, bound into the OT VRF.
interface eth2
 description pe-ce-br3-OT
 ip vrf forwarding OT
 ip address 10.2.30.1/30
exit
!
router isis CORE
 is-type level-2-only
 net 49.0001.0000.0000.0006.00
 metric-style wide
 segment-routing on
 segment-routing global-block 16000 23999
 segment-routing prefix 10.0.0.6/32 index 6
exit
!
! Global BGP: VPNv4 session to the RR (10.0.0.8). send-community both REQUIRED.
router bgp 65000
 bgp router-id 10.0.0.6
 no bgp default ipv4-unicast
 neighbor 10.0.0.8 remote-as 65000
 neighbor 10.0.0.8 update-source lo
 !
 address-family ipv4 vpn
  neighbor 10.0.0.8 activate
  neighbor 10.0.0.8 send-community both
 exit-address-family
exit
!
! Per-VRF BGP: redistribute connected/static customer routes into VPNv4 with the
! VRF's route-target. `rt vpn both` + `label vpn export auto` is the canonical
! FRR L3VPN recipe.
router bgp 65000 vrf OT
 bgp router-id 10.0.0.6
 address-family ipv4 unicast
  redistribute connected
  redistribute static
  rd vpn export 100:2
  rt vpn both 100:2
  label vpn export auto
  export vpn
  import vpn
 exit-address-family
exit
router bgp 65000 vrf CORP
 bgp router-id 10.0.0.6
 address-family ipv4 unicast
  redistribute connected
  rd vpn export 100:1
  rt vpn both 100:1
  label vpn export auto
  export vpn
  import vpn
 exit-address-family
exit
