! FRRouting config — Customer Edge ce-br2 (branch spoke + SD-WAN overlay)
! =======================================================================
! Branch spoke: customer LAN + GRE-over-IPSec overlay to the hub head-end, OSPF
! inside the tunnel. Mirrors ce-br1 with branch-2 addressing.
frr version 10.3
frr defaults traditional
hostname ce-br2
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.22/32
exit
interface eth1
 description to-pe-hub-CORP
 ip address 10.2.21.2/30
 ip ospf cost 10
exit
interface eth2
 description branch2-LAN
 ip address 192.168.21.1/24
exit
interface gre1
 description overlay-to-hub
 ip address 172.16.21.2/30
 ip ospf cost 100
 ip ospf network point-to-point
 ip ospf dead-interval 12
 ip ospf hello-interval 3
exit
!
router ospf
 ospf router-id 10.0.0.22
 network 192.168.21.0/24 area 0
 network 172.16.21.0/30 area 0
 network 10.2.21.0/30 area 0
 bfd
exit
