! FRRouting config — Customer Edge ce-br1 (branch spoke + SD-WAN overlay)
! =======================================================================
! A branch CE: customer LAN + a GRE-over-IPSec overlay tunnel to the hub head-end
! (ce-hub) with OSPF running INSIDE the tunnel so the overlay path can reroute.
! Scenario C (intermittent MPLS underlay failure / tunnel degradation) targets
! this branch's tunnel-hub (entity br1:ce-br1:CE:tunnel-hub): rising loss/jitter
! + IPSec rekey anomalies are the precursors.
!
! The IPSec SA + gre1 interface are established by strongSwan
! (configs/strongswan/ce-br1.ipsec.conf); FRR just runs OSPF over gre1.
frr version 10.3
frr defaults traditional
hostname ce-br1
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.21/32
exit
!
! PE-CE access link (into the CORP VRF on the PE side).
interface eth1
 description to-pe-hub-CORP
 ip address 10.2.11.2/30
 ip ospf cost 10
exit
!
! Customer LAN at the branch.
interface eth2
 description branch1-LAN
 ip address 192.168.11.1/24
exit
!
! GRE-over-IPSec overlay to the hub (gre1 created by strongSwan/ip-tunnel).
! OSPF over the tunnel makes the overlay dynamically routable.
interface gre1
 description overlay-to-hub
 ip address 172.16.11.2/30
 ip ospf cost 100
 ip ospf network point-to-point
 ip ospf dead-interval 12
 ip ospf hello-interval 3
exit
!
! OSPF: advertise the branch LAN, form an adjacency over the overlay + the
! PE-CE link. BFD speeds up tunnel-down detection (scenario C).
router ospf
 ospf router-id 10.0.0.21
 network 192.168.11.0/24 area 0
 network 172.16.11.0/30 area 0
 network 10.2.11.0/30 area 0
 bfd
exit
