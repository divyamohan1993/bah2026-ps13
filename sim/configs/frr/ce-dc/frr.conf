! FRRouting config — Customer Edge ce-dc (datacenter CE, CORP VRF)
! ================================================================
! The DC-side customer edge: advertises the DC server LAN into the CORP L3VPN via
! eBGP to its PE (pe-dc1). No overlay tunnel here (the DC is the overlay hub-of-
! hubs reached via the hub head-end). Hosts/iperf3/TRex servers sit on the LAN.
frr version 10.3
frr defaults traditional
hostname ce-dc
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.20/32
exit
interface eth1
 description to-pe-dc1-CORP
 ip address 10.2.1.6/30
exit
interface eth2
 description dc-server-LAN
 ip address 192.168.1.1/24
exit
!
! eBGP to the PE: advertise the DC LAN into the CORP VRF.
router bgp 65020
 bgp router-id 10.0.0.20
 neighbor 10.2.1.5 remote-as 65000
 address-family ipv4 unicast
  network 192.168.1.0/24
  neighbor 10.2.1.5 activate
 exit-address-family
exit
