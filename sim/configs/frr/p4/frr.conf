! FRRouting config — P core router p4 (IS-IS + SR-MPLS transport)
! ===============================================================
! Core label-switching router between p3 and p1. SRGB base 16000; node SID 4.
frr version 10.3
frr defaults traditional
hostname p4
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.4/32
 ip router isis CORE
 isis passive
exit
interface eth1
 description core-to-p3
 ip address 10.1.34.2/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
interface eth2
 description core-to-p1
 ip address 10.1.41.1/30
 ip router isis CORE
 isis network point-to-point
 mpls enable
exit
!
router isis CORE
 is-type level-2-only
 net 49.0001.0000.0000.0004.00
 metric-style wide
 segment-routing on
 segment-routing global-block 16000 23999
 segment-routing prefix 10.0.0.4/32 index 4
exit
