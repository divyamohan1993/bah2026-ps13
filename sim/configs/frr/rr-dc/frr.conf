! FRRouting config — Route Reflector rr-dc (MP-BGP VPNv4 RR)
! ==========================================================
! Scales the VPNv4 control plane: PEs peer only with the RR instead of a full
! mesh. The RR holds no VRFs/customer data plane — it reflects VPNv4 NLRI
! between PE clients. Scenario B (BGP route flap + reroute cascade) is injected
! against this RR's peering with pe-dc1 (entity rr-dc:peer-pe-dc1), so its
! UPDATE/withdraw churn and adjacency flaps are the ground-truth precursors.
frr version 10.3
frr defaults traditional
hostname rr-dc
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.8/32
 ip router isis CORE
 isis passive
exit
interface eth1
 description to-pe-dc1
 ip address 10.1.108.2/30
 ip router isis CORE
 isis network point-to-point
exit
!
router isis CORE
 is-type level-2-only
 net 49.0001.0000.0000.0008.00
 metric-style wide
exit
!
! RR for the VPNv4 address family. Clients: pe-dc1/pe-dc2/pe-hub. The RR keeps
! all RTs (no import filtering) and reflects between clients. send-community
! both is preserved so RTs survive reflection.
router bgp 65000
 bgp router-id 10.0.0.8
 bgp cluster-id 10.0.0.8
 no bgp default ipv4-unicast
 neighbor RRC peer-group
 neighbor RRC remote-as 65000
 neighbor RRC update-source lo
 neighbor 10.0.0.5 peer-group RRC
 neighbor 10.0.0.6 peer-group RRC
 neighbor 10.0.0.7 peer-group RRC
 !
 address-family ipv4 vpn
  neighbor RRC activate
  neighbor RRC route-reflector-client
  neighbor RRC send-community both
 exit-address-family
exit
