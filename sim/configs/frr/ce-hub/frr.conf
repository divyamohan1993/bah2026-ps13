! FRRouting config — Customer Edge ce-hub (SD-WAN overlay head-end)
! ================================================================
! The hub-spoke aggregation CE: terminates a GRE-over-IPSec tunnel from each
! branch (br1/br2/br3) and one to the DC, and runs OSPF across all of them so the
! overlay reroutes. strongSwan (configs/strongswan/ce-hub.ipsec.conf) brings up
! the IPSec SAs; FRR runs OSPF on the gre* interfaces. This is the head-end whose
! CE-facing PE link (pe-hub:eth3) is the scenario-A congestion target.
frr version 10.3
frr defaults traditional
hostname ce-hub
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.10/32
exit
!
interface eth1
 description to-pe-hub-CORP
 ip address 10.2.1.2/30
 ip ospf cost 10
exit
interface eth2
 description hub-LAN
 ip address 192.168.10.1/24
exit
!
! Overlay tunnels to the branches (gre1=br1, gre2=br2, gre3=br3) + DC (gre4).
interface gre1
 description overlay-to-br1
 ip address 172.16.11.1/30
 ip ospf network point-to-point
 ip ospf hello-interval 3
 ip ospf dead-interval 12
exit
interface gre2
 description overlay-to-br2
 ip address 172.16.21.1/30
 ip ospf network point-to-point
 ip ospf hello-interval 3
 ip ospf dead-interval 12
exit
interface gre3
 description overlay-to-br3
 ip address 172.16.31.1/30
 ip ospf network point-to-point
 ip ospf hello-interval 3
 ip ospf dead-interval 12
exit
!
router ospf
 ospf router-id 10.0.0.10
 network 192.168.10.0/24 area 0
 network 172.16.11.0/30 area 0
 network 172.16.21.0/30 area 0
 network 172.16.31.0/30 area 0
 network 10.2.1.0/30 area 0
 bfd
exit
