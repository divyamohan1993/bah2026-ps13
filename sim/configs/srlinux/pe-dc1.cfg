# Nokia SR Linux startup config — PE pe-dc1 (native gNMI streaming telemetry)
# ==========================================================================
# SR Linux is mixed into the lab on a few PE/P nodes specifically for its
# best-in-class, 100%-YANG, native gNMI on-change + sample(1s) telemetry, which
# Phase 2 (gnmic) consumes directly (research/01 §2.5). This node is the DC PE
# and a VPNv4 RR client. Loaded via `:/tmp/startup.cfg` (see topology.clab.yml).
#
# SR Linux CLI "set" syntax (flat config). Underlay = IS-IS + SR-MPLS; overlay
# control plane = MP-BGP VPNv4 to the route reflector (10.0.0.8).

set / system gnmi-server admin-state enable
set / system gnmi-server network-instance mgmt admin-state enable
set / system gnmi-server unix-socket admin-state enable
# gNMI on-change + sample streaming is what gnmic subscribes to in Phase 2.

set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 address 10.1.101.2/30
set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 address 10.2.1.1/30
set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/3 subinterface 0 ipv4 address 10.1.108.1/30
set / interface system0 subinterface 0 ipv4 address 10.0.0.5/32

set / network-instance default type default
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface system0.0
set / network-instance default protocols isis instance CORE admin-state enable
set / network-instance default protocols isis instance CORE level-capability L2
set / network-instance default protocols isis instance CORE net [ 49.0001.0000.0000.0005.00 ]
set / network-instance default protocols isis instance CORE segment-routing mpls admin-state enable

# L3VPN VRF CORP (RD/RT 100:1) with MP-BGP VPNv4 to the route reflector.
set / network-instance CORP type ip-vrf
set / network-instance CORP interface ethernet-1/2.0
set / network-instance CORP protocols bgp-vpn bgp-instance 1 route-distinguisher rd 100:1
set / network-instance CORP protocols bgp-vpn bgp-instance 1 route-target export-rt target:100:1
set / network-instance CORP protocols bgp-vpn bgp-instance 1 route-target import-rt target:100:1

set / network-instance default protocols bgp admin-state enable
set / network-instance default protocols bgp autonomous-system 65000
set / network-instance default protocols bgp router-id 10.0.0.5
set / network-instance default protocols bgp group RR peer-as 65000
set / network-instance default protocols bgp group RR afi-safi vpn-ipv4 admin-state enable
set / network-instance default protocols bgp neighbor 10.0.0.8 peer-group RR
