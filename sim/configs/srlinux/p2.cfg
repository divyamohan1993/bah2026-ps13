# Nokia SR Linux startup config — P core router p2 (gNMI telemetry node)
# ======================================================================
# A core label-switching P router on SR Linux for native gNMI streaming
# telemetry into Phase 2 (research/01 §2.5). IS-IS L2 + SR-MPLS transport only
# (no VRFs). Node SID index 2. Loaded via :/tmp/startup.cfg.

set / system gnmi-server admin-state enable
set / system gnmi-server network-instance mgmt admin-state enable
set / system gnmi-server unix-socket admin-state enable

set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 address 10.1.12.2/30
set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 address 10.1.23.1/30
set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/3 subinterface 0 ipv4 address 10.1.102.2/30
set / interface system0 subinterface 0 ipv4 address 10.0.0.2/32

set / network-instance default type default
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0
set / network-instance default interface ethernet-1/3.0
set / network-instance default interface system0.0
set / network-instance default protocols isis instance CORE admin-state enable
set / network-instance default protocols isis instance CORE level-capability L2
set / network-instance default protocols isis instance CORE net [ 49.0001.0000.0000.0002.00 ]
set / network-instance default protocols isis instance CORE segment-routing mpls admin-state enable
set / network-instance default protocols isis instance CORE interface ethernet-1/1.0 circuit-type point-to-point
set / network-instance default protocols isis instance CORE interface ethernet-1/2.0 circuit-type point-to-point
