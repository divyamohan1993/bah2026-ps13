; Grafana config for the AIR-GAPPED NETRA deployment.
; Mount read-only at /etc/grafana/grafana.ini. Everything here is geared to
; "no outbound network, no CDN, local-only auth". Values can also be set via
; GF_<SECTION>_<KEY> env vars in docker-compose.

[server]
http_addr = 127.0.0.1
http_port = 3000
; Serve Grafana's own JS/CSS from itself; never a CDN.
serve_from_sub_path = false

[analytics]
; Kill all phone-home / update checks (air-gap: nothing to reach out for).
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false
feedback_links_enabled = false

[news]
news_feed_enabled = false

[auth.anonymous]
; Local NOC wall: anonymous read-only viewer so the dashboards show on a kiosk
; without a login round-trip. Tighten to real auth for multi-user installs.
enabled = true
org_role = Viewer
hide_version = true

[auth]
disable_login_form = false

[security]
allow_embedding = true
; If any vendored plugin is unsigned, list it here (comma-separated plugin ids).
; allow_loading_unsigned_plugins =

[plugins]
; Do NOT fetch plugins at runtime; only what is vendored into the plugins dir.
plugin_admin_enabled = false

[panels]
; Block external image rendering / data sources that could leak.
disable_sanitize_html = false

[log]
mode = console
level = info
